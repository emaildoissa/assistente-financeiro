version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assessor
      POSTGRES_PASSWORD: assessor_dev
      POSTGRES_DB: assessor
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://assessor:assessor_dev@postgres:5432/assessor
      JWT_SECRET: dev-secret-change-in-production
      PORT: 3000
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/api/src:/app/src

volumes:
  postgres_data:
